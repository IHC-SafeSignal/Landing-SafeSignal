<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta — SafeSignal</title>
  <link rel="stylesheet" href="assets/styles/app.css" />
</head>
<body>
  <div class="auth-page">
    <nav class="top-nav">
      <a href="index.html" class="top-nav__logo">
        <svg width="22" height="22" viewBox="0 0 28 28" fill="none"><path d="M14 2L4 6.5V13.5C4 19.2 8.4 24.5 14 26C19.6 24.5 24 19.2 24 13.5V6.5L14 2Z" fill="#1e3a5f"/><path d="M11 13.5L13 15.5L17 11.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        SafeSignal
      </a>
      <div class="top-nav__actions">
        <button class="btn-sos"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1L2 3.5V7C2 10 4.3 12.7 7 13.5C9.7 12.7 12 10 12 7V3.5L7 1Z" fill="white"/></svg>SOS</button>
      </div>
    </nav>
    <div class="auth-body" style="padding:32px 20px;">
      <div class="auth-card" style="max-width:640px;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
          <div>
            <h1 class="auth-card__title">Crear nueva cuenta</h1>
            <p class="auth-card__sub" style="margin-bottom:0;">Únete a la red de seguridad ciudadana más confiable de Lima.</p>
          </div>
        </div>
        <div style="height:1px;background:var(--border);margin:20px 0;"></div>
        <div class="grid-2" style="gap:16px;">
          <div class="form-group" style="margin-bottom:0;"><label class="form-label">Nombres</label><input class="form-input" type="text" id="nombres" placeholder="Ej. Juan Alberto" /></div>
          <div class="form-group" style="margin-bottom:0;"><label class="form-label">Apellidos</label><input class="form-input" type="text" id="apellidos" placeholder="Ej. Pérez Quispe" /></div>
        </div>
        <div class="grid-2" style="gap:16px;margin-top:16px;">
          <div class="form-group" style="margin-bottom:0;">
            <label class="form-label">Correo electrónico</label>
            <div class="form-group-icon"><svg class="form-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="10" rx="2" stroke="#94a3b8" stroke-width="1.4"/><path d="M1 5L8 9.5L15 5" stroke="#94a3b8" stroke-width="1.4"/></svg><input class="form-input form-input--icon" type="email" id="email" placeholder="usuario@ejemplo.com" /></div>
          </div>
          <div class="form-group" style="margin-bottom:0;">
            <label class="form-label">Teléfono</label>
            <div class="form-group-icon"><svg class="form-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 2H6L7.5 5.5L5.5 6.5C6.4 8.3 7.7 9.6 9.5 10.5L10.5 8.5L14 10V13C14 13.5 13.5 14 13 14C7.5 14 2 8.5 2 3C2 2.5 2.5 2 3 2Z" stroke="#94a3b8" stroke-width="1.4"/></svg><input class="form-input form-input--icon" type="tel" id="telefono" placeholder="987 654 321" /></div>
          </div>
        </div>
        <div class="form-group" style="margin-top:16px;">
          <label class="form-label">Distrito / Ubicación habitual</label>
          <div class="form-group-icon">
            <svg class="form-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1.5C5.5 1.5 3.5 3.5 3.5 6C3.5 9.5 8 14.5 8 14.5C8 14.5 12.5 9.5 12.5 6C12.5 3.5 10.5 1.5 8 1.5Z" stroke="#94a3b8" stroke-width="1.4" fill="none"/></svg>
            <select class="form-select form-input--icon" id="distrito">
              <option value="">Selecciona tu distrito</option>
              <option>Miraflores</option><option>San Isidro</option><option>Barranco</option><option>Surco</option><option>San Borja</option><option>La Molina</option><option>Jesús María</option><option>Lince</option><option>Magdalena</option><option>Pueblo Libre</option><option>Cercado de Lima</option><option>Callao</option><option>Los Olivos</option><option>San Martín de Porres</option><option>Otro</option>
            </select>
          </div>
        </div>
        <div class="grid-2" style="gap:16px;margin-top:0;">
          <div class="form-group" style="margin-bottom:0;"><label class="form-label">Contraseña</label><div class="form-group-icon"><svg class="form-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="3" y="6" width="10" height="8" rx="2" stroke="#94a3b8" stroke-width="1.4"/><path d="M5 6V4.5C5 3.1 6.3 2 8 2C9.7 2 11 3.1 11 4.5V6" stroke="#94a3b8" stroke-width="1.4"/><circle cx="8" cy="10" r="1.3" fill="#94a3b8"/></svg><input class="form-input form-input--icon" type="password" id="pass" placeholder="Mínimo 8 caracteres" /></div></div>
          <div class="form-group" style="margin-bottom:0;"><label class="form-label">Confirmar contraseña</label><div class="form-group-icon"><svg class="form-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8C3 5.2 5.2 3 8 3C10.8 3 13 5.2 13 8C13 10.8 10.8 13 8 13C5.2 13 3 10.8 3 8Z" stroke="#94a3b8" stroke-width="1.4"/><path d="M6 8L7.5 9.5L10.5 6.5" stroke="#94a3b8" stroke-width="1.4" stroke-linecap="round"/></svg><input class="form-input form-input--icon" type="password" id="passConf" placeholder="Repite tu contraseña" /></div></div>
        </div>
        <button class="btn-primary" id="btnRegister" style="margin-top:20px;">Crear cuenta →</button>
        <div class="auth-card__footer">¿Ya tienes una cuenta? <a href="login.html">Iniciar sesión</a></div>
        <div class="auth-security"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0;margin-top:2px;"><path d="M8 1L2 4V8C2 11.3 4.6 14.4 8 15.3C11.4 14.4 14 11.3 14 8V4L8 1Z" fill="#94a3b8"/></svg>Tus datos están encriptados bajo protocolos militares AES-256.</div>
      </div>
    </div>
  </div>
  <script src="assets/scripts/register.js"></script>
</body>
</html>
