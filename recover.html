<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar contraseña — SafeSignal</title>
  <link rel="stylesheet" href="assets/styles/app.css" />
</head>
<body>
  <div class="auth-page">
    <nav class="top-nav">
      <a href="index.html" class="top-nav__logo">
        <svg width="22" height="22" viewBox="0 0 28 28" fill="none"><path d="M14 2L4 6.5V13.5C4 19.2 8.4 24.5 14 26C19.6 24.5 24 19.2 24 13.5V6.5L14 2Z" fill="#1e3a5f"/><path d="M11 13.5L13 15.5L17 11.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        SafeSignal
      </a>
      <div class="top-nav__actions"><button class="btn-sos"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1L2 3.5V7C2 10 4.3 12.7 7 13.5C9.7 12.7 12 10 12 7V3.5L7 1Z" fill="white"/></svg>SOS</button></div>
    </nav>
    <div class="auth-body">
      <div style="background:#dde8f5;border-radius:16px;padding:36px 40px;width:100%;max-width:480px;">
        <span class="badge badge--gray" style="float:right;margin-top:-8px;">Cubre: US03</span>
        <h1 style="font-size:26px;font-weight:800;color:var(--navy);margin-bottom:10px;">Recuperar contraseña</h1>
        <p style="font-size:14px;color:var(--muted);margin-bottom:24px;line-height:1.65;">Ingresa tu correo electrónico y te enviaremos las instrucciones para restablecer tu contraseña.</p>
        <div class="form-group">
          <label class="form-label">Correo electrónico</label>
          <div class="form-group-icon">
            <svg class="form-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="10" rx="2" stroke="#94a3b8" stroke-width="1.4"/><path d="M1 5L8 9.5L15 5" stroke="#94a3b8" stroke-width="1.4"/></svg>
            <input class="form-input form-input--icon" type="email" id="email" placeholder="ejemplo@correo.com" />
          </div>
        </div>
        <button class="btn-primary" id="btnSend">Enviar enlace de recuperación</button>
        <div style="text-align:center;margin-top:18px;">
          <a href="login.html" style="font-size:13.5px;color:var(--navy);font-weight:500;display:inline-flex;align-items:center;gap:6px;">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Volver a iniciar sesión
          </a>
        </div>
        <div id="successMsg" style="display:none;margin-top:20px;" class="notif-banner notif-banner--success">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" fill="#22c55e"/><path d="M5 8L7 10L11 6" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
          Enlace enviado. Revisa tu correo electrónico.
        </div>
      </div>
    </div>
    <footer style="text-align:center;padding:16px;font-size:12px;color:#94a3b8;">© 2024 SafeSignal. Todos los derechos reservados.</footer>
  </div>
  <script src="assets/scripts/recover.js"></script>
</body>
</html>
